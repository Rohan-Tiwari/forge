name: release

# Tag-triggered GitHub Release.
# Builds sdist + wheel, validates them with twine, then attaches both to
# a GitHub Release for the tag. CHANGELOG.md is used as the release notes
# if a matching version section is found.
#
# Install from a release:
#   pip install https://github.com/Rohan-Tiwari/forge/releases/download/v0.2.4/forge_agent-0.2.4-py3-none-any.whl
#
# Or pin to a tag without releases:
#   pip install git+https://github.com/Rohan-Tiwari/forge.git@v0.2.4

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog extraction

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build

      - name: Validate artifacts
        run: python -m twine check dist/*

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Pull the matching ## [X.Y.Z] section from CHANGELOG.md (everything
          # between this version's heading and the next ## heading).
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" ver "]") > 0) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG" > release_notes.md
          fi
          echo "Notes for $TAG:"
          cat release_notes.md

      - name: Create GitHub Release with wheel + sdist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Pre-releases (anything with a hyphen suffix like -rc, -beta, -alpha)
          # get marked as such; bare semver tags become full releases.
          PRERELEASE=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            $PRERELEASE \
            dist/*.whl dist/*.tar.gz
